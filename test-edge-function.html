<!DOCTYPE html>
<html>
<head>
    <title>M-Pesa Edge Function Test</title>
</head>
<body>
    <h1>M-Pesa Edge Function Test</h1>
    <button onclick="testFunction()">Test Edge Function</button>
    <pre id="result"></pre>

    <script>
        async function testFunction() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Testing...';

            try {
                const response = await fetch('https://urmjaogeibqombfjscla.supabase.co/functions/v1/mpesa-stk-push', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phoneNumber: '254712345678',
                        amount: 100,
                        orderId: 'test-123',
                        callbackUrl: 'https://example.com/callback'
                    })
                });

                const data = await response.json();
                resultEl.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    data: data
                }, null, 2);
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
